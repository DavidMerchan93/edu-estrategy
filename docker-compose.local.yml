services:
  db:
    image: postgres:16-alpine
    container_name: edu-db
    environment:
      POSTGRES_DB: edustrategy
      POSTGRES_USER: edustrategy
      POSTGRES_PASSWORD: edustrategy123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edustrategy -d edustrategy"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    environment:
      DATABASE_URL: postgresql://edustrategy:edustrategy123@db:5432/edustrategy
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
